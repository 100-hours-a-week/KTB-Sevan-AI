<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통합 게시판 시스템 (게시글/댓글/AI 요약)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

    <div class="max-w-5xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="md:col-span-1 space-y-6">
            <div class="bg-white p-5 rounded-lg shadow border border-gray-200">
                <h2 id="post-form-title" class="text-lg font-bold mb-4 text-blue-600">새 게시글 작성</h2>
                <form id="post-form" class="space-y-3">
                    <input type="hidden" id="post-id">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase">작성자</label>
                        <input type="text" id="post-author" required class="mt-1 block w-full rounded border-gray-300 p-2 text-sm border focus:ring-1 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase">제목</label>
                        <input type="text" id="post-title" required class="mt-1 block w-full rounded border-gray-300 p-2 text-sm border focus:ring-1 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase">본문 내용</label>
                        <textarea id="post-content" rows="4" required class="mt-1 block w-full rounded border-gray-300 p-2 text-sm border focus:ring-1 focus:ring-blue-500 focus:outline-none"></textarea>
                    </div>
                    <div class="flex space-x-2 pt-2">
                        <button type="submit" id="post-submit-btn" class="w-full bg-blue-600 text-white py-2 rounded text-sm font-medium shadow hover:bg-blue-700 transition">게시글 저장</button>
                        <button type="button" id="post-cancel-btn" class="hidden w-1/3 bg-gray-500 text-white py-2 rounded text-sm font-medium shadow hover:bg-gray-600 transition">취소</button>
                    </div>
                </form>
            </div>

            <div id="comment-form-box" class="bg-white p-5 rounded-lg shadow border border-gray-200 opacity-50 pointer-events-none transition-opacity duration-300">
                <h2 id="comment-form-title" class="text-lg font-bold mb-1 text-green-600">댓글 작성</h2>
                <p id="target-post-info" class="text-xs text-gray-400 mb-3">오른쪽에서 대상을 선택하세요.</p>
                <form id="comment-form" class="space-y-3">
                    <input type="hidden" id="target-post-id">
                    <input type="hidden" id="comment-id">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase">댓글 작성자</label>
                        <input type="text" id="comment-author" required class="mt-1 block w-full rounded border-gray-300 p-2 text-sm border focus:ring-1 focus:ring-green-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase">댓글 내용</label>
                        <textarea id="comment-content" rows="3" required class="mt-1 block w-full rounded border-gray-300 p-2 text-sm border focus:ring-1 focus:ring-green-500 focus:outline-none"></textarea>
                    </div>
                    <div class="flex space-x-2 pt-2">
                        <button type="submit" id="comment-submit-btn" class="w-full bg-green-600 text-white py-2 rounded text-sm font-medium shadow hover:bg-green-700 transition">댓글 달기</button>
                        <button type="button" id="comment-cancel-btn" class="hidden w-1/3 bg-gray-500 text-white py-2 rounded text-sm font-medium shadow hover:bg-gray-600 transition">취소</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="md:col-span-2 bg-white p-6 rounded-lg shadow border border-gray-200">
            <h2 class="text-xl font-bold mb-4 text-gray-700 border-b pb-2">전체 게시글 목록</h2>
            <div id="posts-container" class="space-y-6">
                <p class="text-gray-400 text-center py-8">데이터를 불러오는 중입니다...</p>
            </div>
        </div>

    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000/posts";

        // HTML 요소 가져오기
        const postsContainer = document.getElementById("posts-container");
        
        // 게시글 폼 요소
        const postForm = document.getElementById("post-form");
        const postIdInput = document.getElementById("post-id");
        const postAuthorInput = document.getElementById("post-author");
        const postTitleInput = document.getElementById("post-title");
        const postContentInput = document.getElementById("post-content");
        const postSubmitBtn = document.getElementById("post-submit-btn");
        const postCancelBtn = document.getElementById("post-cancel-btn");
        const postFormTitle = document.getElementById("post-form-title");

        // 댓글 폼 요소
        const commentFormBox = document.getElementById("comment-form-box");
        const targetPostInfo = document.getElementById("target-post-info");
        const commentForm = document.getElementById("comment-form");
        const targetPostIdInput = document.getElementById("target-post-id");
        const commentIdInput = document.getElementById("comment-id");
        const commentAuthorInput = document.getElementById("comment-author");
        const commentContentInput = document.getElementById("comment-content");
        const commentSubmitBtn = document.getElementById("comment-submit-btn");
        const commentCancelBtn = document.getElementById("comment-cancel-btn");
        const commentFormTitle = document.getElementById("comment-form-title");

        // [기능 1] 게시글 전체 조회 (GET /posts)
        // [수정된 조회 함수] 두 눈으로 확인해 보세요!
        async function loadDashboard() {
            try {
                const response = await fetch(`${API_URL}/`);
                const result = await response.json();
                
                // 백엔드 응답 규격이 {"data": [...]} 인지, 단순 리스트인지 자동 판별
                const posts = result.data ? result.data : result;

                if (!posts || posts.length === 0) {
                    postsContainer.innerHTML = '<p class="text-gray-400 text-center py-8">등록된 게시글이 없습니다.</p>';
                    return;
                }

                postsContainer.innerHTML = posts.map(post => {
                    // 1. 댓글 출력 로직
                    const commentsHtml = (post.comments && post.comments.length > 0) 
                        ? post.comments.map(c => `
                            <div class="bg-gray-50 p-2.5 rounded text-xs border border-gray-100 flex justify-between items-start">
                                <div>
                                    <span class="font-bold text-gray-700">${escapeHtml(c.author)}:</span>
                                    <span class="text-gray-600">${escapeHtml(c.content)}</span>
                                </div>
                                <div class="flex space-x-1.5 text-gray-400">
                                    <button onclick="prepareCommentUpdate(${post.id}, ${c.id}, '${escapeJs(c.content)}', '${escapeJs(c.author)}')" class="hover:text-yellow-600">수정</button>
                                    <button onclick="deleteComment(${post.id}, ${c.id})" class="hover:text-red-600">삭제</button>
                                </div>
                            </div>
                        `).join('')
                        : '<p class="text-xs text-gray-400 italic">등록된 댓글이 없습니다.</p>';

                    // 2. AI 요약 출력 로직 (세훈님의 모델 스펙인 summaries와 content로 정확히 매칭!)
                    const summaryHtml = post.summaries 
                        ? `<div class="bg-blue-50 border border-blue-100 text-blue-800 p-3 rounded text-xs leading-relaxed font-mono">🤖 AI 요약: ${escapeHtml(post.summaries.content)}</div>`
                        : `<button onclick="generateAiSummary(${post.id})" class="text-xs bg-blue-50 text-blue-600 border border-blue-200 px-2.5 py-1 rounded hover:bg-blue-100 transition font-medium">✨ AI 요약본 요청</button>`;

                    return `
                        <div class="border border-gray-200 p-5 rounded-lg bg-white shadow-sm space-y-4">
                            <div class="flex justify-between items-start">
                                <div>
                                    <span class="text-xs font-bold text-blue-500 tracking-wider">POST #${post.id}</span>
                                    <h3 class="text-lg font-bold text-gray-900 mt-0.5">${escapeHtml(post.title)}</h3>
                                    <p class="text-xs text-gray-400">작성자: <span class="font-semibold text-gray-600">${escapeHtml(post.author)}</span></p>
                                </div>
                                <div class="flex space-x-2 text-xs">
                                    <button onclick="selectPostForComment(${post.id}, '${escapeJs(post.title)}')" class="bg-green-50 text-green-600 border border-green-200 px-2 py-1 rounded hover:bg-green-100 transition font-medium">💬 댓글 달기 선택</button>
                                    <button onclick="preparePostUpdate(${post.id}, '${escapeJs(post.title)}', '${escapeJs(post.content)}', '${escapeJs(post.author)}')" class="text-yellow-600 hover:underline">수정</button>
                                    <button onclick="deletePost(${post.id})" class="text-red-600 hover:underline">삭제</button>
                                </div>
                            </div>
                            
                            <p class="text-sm text-gray-700 whitespace-pre-wrap leading-relaxed bg-gray-50/50 p-3 rounded">${escapeHtml(post.content)}</p>
                            
                            <div class="pt-1">${summaryHtml}</div>
                            
                            <div class="space-y-2 border-t pt-3">
                                <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Comments</h4>
                                <div class="space-y-1.5">${commentsHtml}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error("대시보드 로드 실패:", error);
                postsContainer.innerHTML = '<p class="text-red-500 text-center py-8">서버 연결에 실패했습니다. 백엔드 상태를 점검하세요.</p>';
            }
        }

        // [기능 2] 게시글 생성(POST) 및 수정(PATCH)
        postForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const id = postIdInput.value;
            const payload = { title: postTitleInput.value, content: postContentInput.value, author: postAuthorInput.value };

            try {
                if (id) {
                    await fetch(`${API_URL}/${id}`, {
                        method: "PATCH",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ title: payload.title, content: payload.content })
                    });
                } else {
                    await fetch(`${API_URL}/`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                }
                resetPostForm();
                loadDashboard();
            } catch (err) { console.error(err); }
        });

        // [기능 3] 게시글 삭제 (DELETE)
        async function deletePost(id) {
            if (!confirm(`${id}번 게시글을 삭제하시겠습니까? (댓글 및 요약도 연쇄 삭제됩니다.)`)) return;
            try {
                await fetch(`${API_URL}/${id}`, { method: "DELETE" });
                loadDashboard();
            } catch (err) { console.error(err); }
        }

        // [기능 4] 댓글 생성(POST) 및 수정(PATCH) 명세서 반영
        commentForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const pId = targetPostIdInput.value;
            const cId = commentIdInput.value;
            const payload = { author: commentAuthorInput.value, content: commentContentInput.value };

            try {
                if (cId) {
                    // 특정 댓글 수정 (PATCH /posts/{post_id}/comments/{comment_id})
                    await fetch(`${API_URL}/${pId}/comments/${cId}`, {
                        method: "PATCH",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ content: payload.content })
                    });
                } else {
                    // 댓글 생성 (POST /posts/{post_id}/comments)
                    await fetch(`${API_URL}/${pId}/comments/`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                }
                resetCommentForm();
                loadDashboard();
            } catch (err) { console.error(err); }
        });

        // [기능 5] 댓글 삭제 (DELETE /posts/{post_id}/comments/{comment_id})
        async function deleteComment(pId, cId) {
            if (!confirm("이 댓글을 삭제하시겠습니까?")) return;
            try {
                await fetch(`${API_URL}/${pId}/comments/${cId}`, { method: "DELETE" });
                loadDashboard();
            } catch (err) { console.error(err); }
        }

        // [기능 6] AI 요약 생성 요청 (POST /posts/{post_id}/summaries)
        async function generateAiSummary(pId) {
            try {
                const response = await fetch(`${API_URL}/${pId}/summaries/`, { method: "POST" });
                if (response.ok) {
                    alert("AI 요약이 성공적으로 업데이트되었습니다.");
                    loadDashboard();
                }
            } catch (err) { console.error(err); }
        }

        // 인터페이스 제어용 유틸리티 함수들
        function preparePostUpdate(id, title, content, author) {
            postFormTitle.innerText = `${id}번 게시글 수정`;
            postIdInput.value = id;
            postAuthorInput.value = author;
            postAuthorInput.disabled = true;
            postTitleInput.value = title;
            postContentInput.value = content;
            postSubmitBtn.innerText = "수정 완료";
            postCancelBtn.classList.remove("hidden");
        }

        function selectPostForComment(pId, title) {
            commentFormBox.classList.remove("opacity-50", "pointer-events-none");
            targetPostInfo.innerText = `대상 글: [${pId}] ${title.substring(0, 15)}...`;
            targetPostIdInput.value = pId;
            resetCommentForm(false); 
        }

        function prepareCommentUpdate(pId, cId, content, author) {
            commentFormBox.classList.remove("opacity-50", "pointer-events-none");
            commentFormTitle.innerText = `댓글 #${cId} 수정`;
            targetPostIdInput.value = pId;
            commentIdInput.value = cId;
            commentAuthorInput.value = author;
            commentAuthorInput.disabled = true;
            commentContentInput.value = content;
            commentSubmitBtn.innerText = "댓글 수정 완료";
            commentCancelBtn.classList.remove("hidden");
        }

        postCancelBtn.addEventListener("click", resetPostForm);
        commentCancelBtn.addEventListener("click", () => resetCommentForm(true));

        function resetPostForm() {
            postFormTitle.innerText = "새 게시글 작성";
            postIdInput.value = "";
            postAuthorInput.value = "";
            postAuthorInput.disabled = false;
            postTitleInput.value = "";
            postContentInput.value = "";
            postSubmitBtn.innerText = "게시글 저장";
            postCancelBtn.classList.add("hidden");
        }

        function resetCommentForm(disableBox = true) {
            commentFormTitle.innerText = "댓글 작성";
            commentIdInput.value = "";
            commentAuthorInput.value = "";
            commentAuthorInput.disabled = false;
            commentContentInput.value = "";
            commentSubmitBtn.innerText = "댓글 달기";
            commentCancelBtn.classList.add("hidden");
            if (disableBox) {
                commentFormBox.classList.add("opacity-50", "pointer-events-none");
                targetPostInfo.innerText = "오른쪽에서 대상을 선택하세요.";
                targetPostIdInput.value = "";
            }
        }

        function escapeHtml(str) {
            return str.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m]));
        }
        function escapeJs(str) {
            return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n').replace(/\r/g, '\\r');
        }

        // 최초 실행
        loadDashboard();
    </script>
</body>
</html>
